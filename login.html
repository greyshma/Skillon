<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillon – Sign In</title>
  <meta name="description" content="Sign in to Skillon – Your hyper-personalized AI career roadmap.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Sign-In -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050508;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --accent: #5E5CE6;
      --accent-glow: rgba(94,92,230,0.35);
      --text: #F4F4F5;
      --muted: #71717A;
      --success: #34D399;
      --google-blue: #4285F4;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 520px; height: 520px; background: rgba(94,92,230,0.18); top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 380px; height: 380px; background: rgba(52,211,153,0.1); bottom: -80px; right: -80px; animation-delay: -5s; }
    .orb-3 { width: 260px; height: 260px; background: rgba(251,191,36,0.08); top: 40%; left: 55%; animation-delay: -3s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.06); }
    }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 48px 44px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #8B5CF6);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: white;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .brand-name { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    .brand-tag  { font-size: 0.7rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 32px; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

    /* Name field */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: rgba(94,92,230,0.5);
      box-shadow: 0 0 0 3px rgba(94,92,230,0.12);
    }
    .field input::placeholder { color: var(--muted); }

    /* Google button */
    .btn-google {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .btn-google:active { transform: translateY(0); }
    .btn-google img { width: 20px; height: 20px; }

    /* Manual button */
    .btn-main {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--accent), #7C3AED);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
    .btn-main:active { transform: translateY(0); }

    .terms { text-align: center; font-size: 0.78rem; color: var(--muted); margin-top: 20px; line-height: 1.6; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(30,30,40,0.95); color: white;
      padding: 12px 22px; border-radius: 10px;
      font-size: 0.88rem; border: 1px solid var(--glass-border);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; white-space: nowrap;
      backdrop-filter: blur(12px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Loading spinner overlay */
    .loading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(5,5,8,0.85);
      z-index: 200;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(94,92,230,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div>
      <div>
        <div class="brand-name">Skillon</div>
        <div class="brand-tag">AI Career Accelerator</div>
      </div>
    </div>

    <h1>Welcome back 👋</h1>
    <p class="subtitle">Sign in to resume your hyper-personalized roadmap and pick up exactly where you left off.</p>

    <!-- Google One-Tap / Button -->
    <button class="btn-google" id="google-btn" onclick="handleGoogleLogin()">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
      Continue with Google
    </button>

    <!-- Hidden Google credential holder -->
    <div id="g_id_onload"
      data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
      data-callback="handleGoogleCredential"
      data-auto_prompt="false">
    </div>

    <div class="divider">or continue with name</div>

    <div class="field">
      <label for="login-name">Your Name</label>
      <input id="login-name" type="text" placeholder="e.g. Arjun" autocomplete="name" onkeydown="if(event.key==='Enter') handleManualLogin()" />
    </div>

    <button class="btn-main" onclick="handleManualLogin()">
      <i class="fa-solid fa-rocket"></i> Start Learning
    </button>

    <p class="terms">By signing in you agree to Skillon's Terms of Service & Privacy Policy.<br>No credit card required. Free forever.</p>
  </div>

  <div class="toast" id="toast"></div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Signing you in...</div>
  </div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function showLoading() {
      document.getElementById('loading-overlay').classList.add('active');
    }

    // Manual login (name-only)
    function handleManualLogin() {
      const name = document.getElementById('login-name').value.trim();
      if (!name || name.length < 2) {
        showToast('⚠️ Please enter your name to continue.');
        document.getElementById('login-name').focus();
        return;
      }
      showLoading();
      localStorage.setItem('skillon_name', name);
      localStorage.setItem('skillon_auth', 'manual');
      // Check if already calibrated
      if (localStorage.getItem('skillon_calibrated')) {
        setTimeout(() => { window.location.href = '/'; }, 800);
      } else {
        setTimeout(() => { window.location.href = '/?calibrate=1'; }, 800);
      }
    }

    // Google credential callback (JWT decode)
    function handleGoogleCredential(response) {
      showLoading();
      try {
        // Decode JWT payload (base64)
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const name = payload.given_name || payload.name || 'Learner';
        const email = payload.email || '';
        const picture = payload.picture || '';

        localStorage.setItem('skillon_name', name);
        localStorage.setItem('skillon_email', email);
        localStorage.setItem('skillon_avatar', picture);
        localStorage.setItem('skillon_auth', 'google');

        if (localStorage.getItem('skillon_calibrated')) {
          window.location.href = '/';
        } else {
          window.location.href = '/?calibrate=1';
        }
      } catch(e) {
        document.getElementById('loading-overlay').classList.remove('active');
        showToast('⚠️ Google sign-in failed. Please try the name option.');
      }
    }

    // Redirect to Google button click → trigger the hidden g_id sign-in flow
    function handleGoogleLogin() {
      const clientId = document.querySelector('#g_id_onload').dataset.clientId;
      if (!clientId || clientId.includes('YOUR_GOOGLE_CLIENT_ID')) {
        showToast('ℹ️ Google login not configured yet. Use your name below.');
        document.getElementById('login-name').focus();
        return;
      }
      // Trigger Google prompt
      if (window.google && window.google.accounts) {
        window.google.accounts.id.prompt();
      }
    }

    // If already logged in, redirect straight to app
    if (localStorage.getItem('skillon_name') && localStorage.getItem('skillon_auth')) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
